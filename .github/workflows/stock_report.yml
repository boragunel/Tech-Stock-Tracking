name: Daily Stock Report

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9:00 AM UTC
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        run: |
          python -c "import os; open('credentials.json','w').write(os.environ['GOOGLE_CREDENTIALS'])"
          python -c "import os; open('token.json','w').write(os.environ['GOOGLE_TOKEN'])"

      - name: Restore doc ID
        env:
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
        run: |
          python -c "import os; id=os.environ.get('GOOGLE_DOC_ID',''); open('doc_id.txt','w').write(id) if id else None"

      - name: Run stock report
        run: python create_google_doc.py